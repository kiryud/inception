version: '3'

services:
    mariadb:
        image: mariadb
        container_name: mariadb
        build: ./requirements/mariadb
        restart: always
        expose:
            - "3306"
        volumes:
            - db_volume:/var/lib/mysql
        networks:
            - intra
        env_file:
            - .env


networks:
    intra:
        driver: bridge

volumes:
    db_volume:
        name: db_volume
        driver: local
        driver_opts:
            type: none
            device: /home/jijeong/volume/db
            o: bind
    wp_volume:
        name: wp_volume
        driver: local
        driver_opts:
            type: none
            device: /home/jijeong/volume/wp
            o: bind
