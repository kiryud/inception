version: '3'

services:
    mariadb:
        image: mariadb
        container_name: mariadb
        build: ./requirements/mariadb
        restart: always
        expose:
            - "3306"
        volumes:
            - db_volume:/var/lib/mysql
        networks:
            - intra
        env_file:
            - .env
    wordpress:
        image: wordpress
        container_name: wordpress
        build: ./requirements/wordpress
        depends_on:
            - mariadb
        restart: always
        volumes:
            - wp_volume:/var/www/html
        expose: 
            - "9000"
        networks:
            - intra
        env_file:
            - .env
    nginx:
        image: nginx
        container_name: nginx
        build: ./requirements/nginx
        depends_on:
            - wordpress
        restart: always
        ports:
            - "443:443"
        volumes:
            - ./requirements/nginx/conf/:/etc/nginx/http.d/
            - ./requirements/nginx/tools:/etc/nginx/ssl/
            - wp_volume:/var/www/html
        networks:
            - intra
        env_file:
            - .env

networks:
    intra:
        driver: bridge

volumes:
    db_volume:
        name: db_volume
        driver: local
        driver_opts:
            type: none
            device: /home/jijeong/volume/db
            o: bind
    wp_volume:
        name: wp_volume
        driver: local
        driver_opts:
            type: none
            device: /home/jijeong/volume/wp
            o: bind
